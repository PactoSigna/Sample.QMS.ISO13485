# Strict authoring schema. Sync engine uses lenient "requirement" schema with category=product.
# Auto-generated — run `pnpm generate:schemas` to regenerate
schema_version: "1.0"
document_type: product_requirement
label: "Product Requirement (strict)"
scope: device
folder: docs/product/requirements
id_prefixes: [PRS-]

frontmatter:
  id:               { required: true, type: string }
  title:            { required: true, type: string }
  status:           { required: true, type: enum, values: ["draft", "in_review", "approved", "effective", "archived", "example"] }
  type:             { required: false, inferred: true, notes: "inferred from folder path; omit unless overriding" }
  req_type:         { required: false, type: enum, values: ["functional", "interface", "performance", "security", "usability", "safety", "regulatory"] }
  format:           { required: false, type: enum, values: ["standard", "user_story"] }
  fulfillment_type: { required: false, type: enum, values: ["software", "labeling", "clinical", "usability", "regulatory_doc", "process"] }
  traces_from:      { required: true, type: string[] }
  traces_to:        { required: false, type: string[] }
  author:           { required: true, type: string }
  reviewers:        { required: false, type: string[], notes: "department names e.g. Engineering" }
  approvers:        { required: true, type: string[] }

sections:
  required: []
